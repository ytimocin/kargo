name: Publish cross-fleet image

on:
  push:
    branches:
      - cross-fleet
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:3.0.0
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base image
        run: |
          BASE_IMAGE=localhost:5000/kargo-base make build-base-image
          docker push localhost:5000/kargo-base:latest-arm64
          docker push localhost:5000/kargo-base:latest-amd64

      - name: Build and push final image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kargo:cross-fleet
            ghcr.io/${{ github.repository_owner }}/kargo:${{ github.sha }}
          build-args: |
            BASE_IMAGE=localhost:5000/kargo-base
            VERSION=cross-fleet
            GIT_COMMIT=${{ github.sha }}
            GIT_TREE_STATE=clean
