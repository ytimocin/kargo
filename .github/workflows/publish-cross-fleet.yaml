name: Publish cross-fleet image

on:
  push:
    branches:
      - cross-fleet
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kargo:cross-fleet
            ghcr.io/${{ github.repository_owner }}/kargo:${{ github.sha }}
          build-args: |
            VERSION=cross-fleet
            GIT_COMMIT=${{ github.sha }}
            GIT_TREE_STATE=clean
